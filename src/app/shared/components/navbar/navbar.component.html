<header
    class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-700/50 px-4 sm:px-6 lg:px-20 py-4 sm:py-6 relative z-50 w-full">
    <div class="flex items-center gap-6 md:gap-12">
        <a routerLink="/" class="flex items-center gap-3 text-slate-100 cursor-pointer group"
            (click)="closeMobileMenu()">
            <img src="assets/logo.png" alt="A&H Logo"
                class="h-7 sm:h-8 md:h-10 object-contain mix-blend-screen opacity-90 transition-opacity duration-300 group-hover:opacity-100" />
        </a>
        <nav class="hidden md:flex items-center gap-6 lg:gap-10">
            <a routerLink="/collections"
                class="text-slate-300 hover:text-white text-xs tracking-[0.2em] font-light uppercase transition-colors">Collections</a>
            <a routerLink="/catalog"
                class="text-slate-300 hover:text-white text-xs tracking-[0.2em] font-light uppercase transition-colors">Catalog</a>
            <a class="text-slate-300 hover:text-white text-xs tracking-[0.2em] font-light uppercase transition-colors"
                href="#">Bespoke</a>
            <a class="text-slate-300 hover:text-white text-xs tracking-[0.2em] font-light uppercase transition-colors"
                href="#">Heritage</a>
        </nav>
    </div>
    <div class="flex items-center gap-4">
        <a routerLink="/catalog"
            class="hidden sm:flex min-w-[100px] cursor-pointer items-center justify-center border border-accent-purple px-4 lg:px-6 py-2 bg-transparent text-silver text-xs font-bold uppercase tracking-widest hover:bg-accent-purple/40 transition-all">
            Shop Now
        </a>
        <!-- Mobile hamburger -->
        <button class="md:hidden flex flex-col gap-1.5 p-2 text-silver" (click)="toggleMobileMenu()"
            [attr.aria-label]="mobileMenuOpen() ? 'Close menu' : 'Open menu'">
            <span class="material-symbols-outlined text-2xl">{{ mobileMenuOpen() ? 'close' : 'menu' }}</span>
        </button>
    </div>
</header>

<!-- Mobile menu overlay -->
@if (mobileMenuOpen()) {
<div class="fixed inset-0 z-40 bg-charcoal/98 flex flex-col items-center justify-center gap-8 md:hidden"
    style="background: rgba(18, 18, 18, 0.98);">
    <a routerLink="/collections" (click)="closeMobileMenu()"
        class="text-silver text-lg tracking-[0.3em] uppercase font-light hover:text-white transition-colors">Collections</a>
    <a routerLink="/catalog" (click)="closeMobileMenu()"
        class="text-silver text-lg tracking-[0.3em] uppercase font-light hover:text-white transition-colors">Catalog</a>
    <a href="#" (click)="closeMobileMenu()"
        class="text-silver/50 text-lg tracking-[0.3em] uppercase font-light">Bespoke</a>
    <a href="#" (click)="closeMobileMenu()"
        class="text-silver/50 text-lg tracking-[0.3em] uppercase font-light">Heritage</a>
    <div class="mt-8 border-t border-accent-purple/30 pt-8">
        <a routerLink="/catalog" (click)="closeMobileMenu()"
            class="border border-accent-purple px-8 py-3 text-silver text-xs font-bold uppercase tracking-widest hover:bg-accent-purple/40 transition-all">
            Shop Now
        </a>
    </div>
</div>
}
